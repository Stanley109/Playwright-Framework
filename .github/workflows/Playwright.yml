name: Playwright CI

on:
    push:
        branches: [ master , features/anything]
    pull_request:
        branches: [ master ]
    schedule:
        - cron: '0 0 * * *'
    workflow_dispatch:
        inputs:
            environment:
                description: 'Target Environment'
                required: false
                default: 'sit'
                type: choice
                options:
                    - sit
                    - uat
            suite:
                description: 'Test Suite (Tag)'
                required: false
                default: 'smoke'
                type: 'choice'
                options:
                    - smoke
                    - regression
    
concurrency:
    group: ${{github.workflow}}-${{github.ref}}
    cancel-in-progress: true

jobs:
    test:
        name: Playwright Tests (${{github.event.inputs.suite || 'smoke'}} / ${{github.event.inputs.environment || 'sit'}})
        runs-on: ubuntu-latest
        container:
            image: mcr.microsoft.com/playwright:v1.61.0-noble
            options: --user root
        timeout-minutes: 60

        env:
            CI: true
        
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
